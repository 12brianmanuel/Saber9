<script>
    (function() {
        // ------------------------------------------------------------
        // BASE DE DATOS DE PREGUNTAS
        // ------------------------------------------------------------
        const questions = [
            {
                id: 1,
                taxonomy: {
                    competence: "Interpretación y análisis de perspectivas",
                    affirmation: "Comprende perspectivas de distintos actores y grupos sociales",
                    evidence: "2.2 Reconoce que las cosmovisiones, ideologías y roles sociales influyen en diferentes argumentos, posiciones y conductas",
                    basicNotions: "Democracia, participación ciudadana, voto libre y secreto, deber cívico, garantías electorales, rol de actores sociales"
                },
                context: `En el municipio de San Jerónimo, dos semanas antes de las elecciones locales, coinciden estos hechos:

I. En reuniones barriales, funcionarios presentan videos con logo institucional y el lema “Cumplir con el municipio es votar”; afirman que “no votar frena proyectos” y no precisan que el voto es libre ni que no hay sanción por abstenerse.

II. Equipos de campaña de varios partidos ofrecen bonos y dinero en barrios con alto desempleo; piden foto del tarjetón y ofrecen transporte solo a quienes acepten el intercambio.

III. Líderes comunitarios impulsan una jornada de pedagogía cívica (escuelas, parques, emisoras) con tres mensajes: el voto es un derecho (libre, igual, secreto), la participación es un deber cívico (ético, no coactivo) y la compra de votos deteriora la representación.

IV. Varias organizaciones proponen medidas operativas para el día electoral: rutas de transporte abiertas a toda la ciudadanía sin condicionamientos, veedurías para monitorear puntos críticos y canales de denuncia para reportar presión o compra de voto.`,
                question: "Considerando las garantías del sufragio y el sentido cívico del deber de participación en un contexto de vulnerabilidad, ¿cuál valoración es más consistente con los principios democráticos y con acciones compatibles con esas garantías?",
                options: [
                    "A. Las prácticas de I y II son incompatibles con el voto libre y secreto; III y IV son coherentes porque combinan pedagogía no coactiva y apoyos universales no condicionados, lo que protege la decisión del elector sin favorecer campañas.",
                    "B. Las prácticas de I y II son aceptables como estímulos al deber; III y IV son redundantes porque la voluntariedad del intercambio preserva la libertad del elector y los apoyos logísticos pueden focalizarse en quienes ya eligieron candidato.",
                    "C. Las prácticas de I y III equilibran derecho y deber; II y IV son tolerables si se garantiza secreto con cabinas y si el transporte prioriza a votantes con compromiso manifiesto, para optimizar recursos en zonas críticas.",
                    "D. Las prácticas de II y IV fortalecen la participación; I y III son neutras porque la difusión institucional acompaña decisiones y la pedagogía no incide en la reducción de compra de votos en contextos de pobreza."
                ],
                correct: 0,
                justification: `La opción A es correcta porque realiza una valoración ajustada a los principios democráticos y a las garantías del sufragio (voto libre, secreto y autónomo):

- I y II son incompatibles: I constituye propaganda institucional coercitiva que vulnera la neutralidad del Estado y presiona al elector. II describe compra de votos (delito electoral) que atenta contra la autonomía del sufragio.
- III y IV son coherentes: III promueve pedagogía no coactiva que fortalece la autonomía ciudadana. IV propone medidas de apoyo universal y veeduría que protegen a todos los votantes sin condicionamientos.

El estudiante que selecciona esta opción demuestra que reconoce cómo los roles sociales (funcionarios que presionan, partidos que cooptan, líderes que educan, organizaciones que vigilan) influyen en la compatibilidad o incompatibilidad de sus conductas con los principios democráticos.`,
                distractors: [
                    "B. Normaliza la compra de votos. Afirmar que el intercambio de dinero por voto es 'aceptable como estímulo' desconoce que, en contextos de vulnerabilidad, la 'voluntariedad' es ficticia y que la compra de votos es un delito que atenta contra la autonomía del elector.",
                    "C. Tolera lo intolerable. Sostener que la compra de votos (II) es 'tolerable' si se garantiza el secreto en cabinas es un error grave, pues la compra de votos es ilegal independientemente de las condiciones logísticas.",
                    "D. Desconoce el valor de la pedagogía. Afirmar que la pedagogía cívica (III) 'no incide en la reducción de compra de votos' contradice el fundamento de la formación ciudadana como pilar para el fortalecimiento democrático a largo plazo."
                ]
            },
            {
                id: 2,
                taxonomy: {
                    competence: "Pensamiento Social",
                    affirmation: "Comprende que los problemas y sus soluciones involucran distintas dimensiones y reconoce relaciones entre estas",
                    evidence: "1.4 Conoce los mecanismos que los ciudadanos tienen a su disposición para participar activamente en la democracia y para garantizar el respeto de sus derechos",
                    basicNotions: "Plebiscito, mecanismos de participación democrática, diferencias entre plebiscito y referendo, características legales del plebiscito, Constitución Política de Colombia (Artículo 103), Ley 134 de 1994"
                },
                context: `La Constitución Política de Colombia establece en su Artículo 103 que "son mecanismos de participación del pueblo en ejercicio de su soberanía: el voto, el plebiscito, el referendo, la consulta popular, el cabildo abierto, la iniciativa legislativa y la revocatoria del mandato".

Un estudiante está preparando una exposición sobre el plebiscito y escribe cuatro afirmaciones en su cuaderno:

1. "El plebiscito es un mecanismo que puede ser convocado tanto por el Presidente como por los ciudadanos mediante la recolección de firmas".
2. "El plebiscito permite que los ciudadanos se pronuncien sobre una decisión fundamental tomada por el Presidente".
3. "El plebiscito puede utilizarse para aprobar una reforma constitucional propuesta por el Congreso".
4. "La decisión de los ciudadanos en un plebiscito es obligatoria para el Presidente".`,
                question: "De acuerdo con lo establecido, ¿cuál de las siguientes opciones presenta las afirmaciones CORRECTAS?",
                options: [
                    "A. 1 y 3",
                    "B. 2 y 4",
                    "C. 2 y 3",
                    "D. 1 y 4"
                ],
                correct: 1,
                justification: `La opción B (2 y 4) es la correcta:

- Afirmación 1: INCORRECTA. Según la Ley 134 de 1994, el plebiscito es de exclusiva convocatoria del Presidente. Los ciudadanos no pueden convocarlo.
- Afirmación 2: CORRECTA. Es la esencia del plebiscito: el pueblo apoya o rechaza una decisión del Ejecutivo.
- Afirmación 3: INCORRECTA. La aprobación de reformas constitucionales corresponde al referendo constitucional, no al plebiscito.
- Afirmación 4: CORRECTA. La Ley 134 establece que el pronunciamiento del pueblo en un plebiscito es de carácter obligatorio para el Presidente.`,

                    "C. 2 y 3: Mezcla una afirmación correcta (2) con una incorrecta (3). Sabe algo de plebiscito pero no logra diferenciarlo claramente del referendo.",
                    "D. 1 y 4: Mezcla una afirmación correcta (4) con una incorrecta (1). Desconoce quién puede convocar el plebiscito."
                ]
            },
            {

                    competence: "Interpretación y análisis de perspectivas",

                },
                context: `En el departamento de Monteverde existen profundas brechas educativas entre la zona urbana y la rural. La gobernadora propone convocar una consulta popular para que los ciudadanos decidan si el departamento debe destinar el 30% del presupuesto de regalías durante cinco años a la educación rural.

Ante esta propuesta surgen las siguientes posturas:

I. Gobernadora: "La ciudadanía debe decidir si priorizamos la educación rural. Si el pueblo lo aprueba, tendremos mandato para actuar".
II. Consejo de Planeación: "La consulta es legítima, pero las decisiones presupuestales requieren estudios de sostenibilidad fiscal".
III. Asociación de Empresarios: "Las regalías deben destinarse a proyectos productivos, no a escuelas rurales. Eso le corresponde al gobierno nacional".
IV. Juntas de Acción Comunal rurales: "Nuestros niños merecen estudiar con dignidad. Es la única manera de romper el círculo de pobreza".`,
                question: "De acuerdo con las posturas anteriores, ¿cuál de las siguientes opciones establece una relación correcta entre la perspectiva de cada actor y la consulta popular como propuesta de solución?",
                options: [
                    "A. La gobernadora y las JAC respaldan la consulta; el Consejo la condiciona a viabilidad fiscal; los empresarios la rechazan porque prefieren inversión productiva.",
                    "B. La gobernadora y el Consejo apoyan la consulta; los empresarios y las JAC la rechazan por razones económicas y sociales respectivamente.",
                    "C. La gobernadora y los empresarios promueven la consulta; el Consejo y las JAC se oponen por falta de recursos y por desconfianza en el Estado.",
                    "D. La gobernadora y el Consejo condicionan la consulta al debate técnico; los empresarios y las JAC la respaldan sin condiciones."

                    if (evidPercentage >= 80) badge = '<span class="badge-excelente">Excelente</span>';
                    else if (evidPercentage >= 60) badge = '<span class="badge-bien">Bien</span>';
                    else if (evidPercentage >= 40) badge = '<span class="badge-regular">Regular</span>';
                    else badge = '<span class="badge-mejorar">Por mejorar</span>';

                    competenciasHtml += `
                        <tr>
                            <td>${comp}</td>
                            <td>${evid.substring(0, 60)}</td>
                            <td>${data.correctas}/${data.total} (${evidPercentage.toFixed(0)}%)</td>
                            <td>${badge}</td>
                        </tr>
                    `;
                }
            }

            competenciasHtml += `</tbody></table>`;

            let resultsHtml = `
                <div class="results-panel">
                    <h2 style="text-align:center;">📊 Resultados Consolidados</h2>
                    <div style="text-align:center; margin-bottom:20px; font-size:1.2rem; background:rgba(255,255,255,0.15); padding:15px; border-radius:50px;">
                        <strong>${state.studentName}</strong> - Curso: ${state.studentCourse}
                    </div>
                    <div class="results-grid">
                        <div class="result-card">
                            <h3>📈 Cuantitativo</h3>
                            <div class="score-big">${correctCount}/${questions.length}</div>
                            <p style="text-align:center; font-size:1.5rem;">${percentage.toFixed(1)}%</p>
                        </div>
                        <div class="result-card">
                            <h3>🧠 Cualitativo</h3>
                            <p>${cualitativoGlobal}</p>
                        </div>
                    </div>

                    <div class="feedback-detalle">
                        <h3 style="color:#1a2b4c;">🔍 Retroalimentación por pregunta</h3>
            `;

            resultsPerQuestion.forEach((r, idx) => {
                resultsHtml += `
                    <div class="pregunta-resumen">
                        <h4 style="color:#1a2b4c;">Pregunta ${idx + 1}</h4>
                        <div class="taxonomy-mini">
                            <p><strong>Competencia:</strong> ${r.taxonomy.competence}</p>
                            <p><strong>Evidencia:</strong> ${r.taxonomy.evidence}</p>
                        </div>
                        <p><strong>Tu respuesta:</strong> ${r.userAnswerText}</p>
                        <p><strong>Respuesta correcta:</strong> ${r.correctAnswerText}</p>
                        <div class="justificacion">
                            <strong>Justificación:</strong><br>${r.justification.substring(0, 150)}...
                        </div>
                    </div>
                `;
            });

            resultsHtml += `
                        ${competenciasHtml}
                        <h4 style="margin-top:30px;">📘 Estrategia de mejora</h4>
                        <p>${estrategiaGlobal}</p>
                    </div>
                    <button class="btn-restart" id="restartBtn" style="background:#ffb300; color:#1a2b4c; width:100%;">Volver a intentar</button>
                </div>
            `;

            contentDiv.innerHTML = resultsHtml;

            // Guardar resultados
            saveResults(correctCount, percentage);

            document.getElementById('restartBtn')?.addEventListener('click', () => {
                state.started = false;
                state.currentQuestionIndex = 0;
                state.userAnswers = [null, null, null, null, null, null, null];
                state.submitted = false;
                render();
            });
        }

        // ==================================================
        // FUNCIÓN PARA ENVIAR A GOOGLE SHEETS (CORREGIDA)
        // ==================================================
        function saveResults(correctCount, percentage) {
            // Preparar los datos
            const datos = {
                nombre: state.studentName,
                curso: state.studentCourse,
                totalPreguntas: questions.length,
                aciertos: correctCount,
                porcentaje: percentage.toFixed(1),
                p1: state.userAnswers[0] !== null ? ['A', 'B', 'C', 'D'][state.userAnswers[0]] : '',
                p2: state.userAnswers[1] !== null ? ['A', 'B', 'C', 'D'][state.userAnswers[1]] : '',
                p3: state.userAnswers[2] !== null ? ['A', 'B', 'C', 'D'][state.userAnswers[2]] : '',
                p4: state.userAnswers[3] !== null ? ['A', 'B', 'C', 'D'][state.userAnswers[3]] : '',
                p5: state.userAnswers[4] !== null ? ['A', 'B', 'C', 'D'][state.userAnswers[4]] : '',
                p6: state.userAnswers[5] !== null ? ['A', 'B', 'C', 'D'][state.userAnswers[5]] : '',
                p7: state.userAnswers[6] !== null ? ['A', 'B', 'C', 'D'][state.userAnswers[6]] : ''
            };

            console.log('📤 Enviando datos:', datos);

            // URL de Google Apps Script (REEMPLAZA ESTO)
            const url = 'https://script.google.com/macros/s/AKfycbxAqbSOaoU53jMGNX_FPgCyyVNsPxswMdInKRNLslS3XXPia_uq5jUQ0ZdH5v0dKim6/exec';

            // Enviar usando JSON
            fetch(url, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(datos)
            })
            .then(response => response.json())
            .then(data => {
                console.log('✅ Respuesta:', data);
                showNotification('✅ Resultados guardados en Google Sheets');
            })
            .catch(error => {
                console.error('❌ Error:', error);
                showNotification('⚠️ Datos guardados localmente', true);
            });

            // Guardar también en localStorage como respaldo
            const history = JSON.parse(localStorage.getItem('saber11_history') || '[]');
            history.push({
                fecha: new Date().toISOString(),
                ...datos
            });
            localStorage.setItem('saber11_history', JSON.stringify(history));
        }

        render();
    })();
</script>
</body>
</html>
